<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Radar — 투자 테마 실시간 추적</title>
<meta name="description" content="AI가 분석하는 HBM·AI반도체·전기차 등 20개 투자 테마 실시간 뉴스·주가·인사이트">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e14;--panel:#121a26;--line:#1e2c3d;--line2:#27384c;
  --txt:#e6edf5;--muted:#8a9bb0;--dim:#5c6c80;
  --accent:#76b900;--gold:#e0b341;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
  --sans:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',-apple-system,sans-serif;
}
html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh}

/* ── 홈 레이아웃 ── */
.home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px}
.logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.15em;font-family:var(--mono);margin-bottom:32px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent)}50%{box-shadow:0 0 18px var(--accent)}}
h1{font-size:clamp(28px,6vw,52px);font-weight:800;letter-spacing:-.02em;text-align:center;line-height:1.15;margin-bottom:12px}
h1 span{color:var(--accent)}
.sub{color:var(--muted);font-size:15px;text-align:center;margin-bottom:40px;max-width:480px;line-height:1.7}

/* ── 검색창 ── */
.search-wrap{width:100%;max-width:620px;position:relative;margin-bottom:32px}
.search-input{width:100%;background:var(--panel);border:1.5px solid var(--line2);border-radius:14px;padding:16px 56px 16px 20px;font:500 16px var(--sans);color:var(--txt);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--dim)}
.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:9px;padding:8px 14px;color:#05210a;font:700 13px var(--sans);cursor:pointer}
.search-btn:hover{background:#8fd600}

/* ── 드롭다운 ── */
.dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel);border:1px solid var(--line2);border-radius:12px;overflow:hidden;z-index:100;display:none}
.dropdown.show{display:block}
.dd-item{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;transition:background .12s}
.dd-item:hover{background:rgba(118,185,0,.08)}
.dd-icon{font-size:18px;flex-shrink:0}
.dd-name{font:600 14px var(--sans);color:var(--txt)}
.dd-tier{font:500 10px var(--mono);padding:2px 6px;border-radius:5px;margin-left:auto}
.tier-hot{background:rgba(239,68,68,.15);color:#f87171}
.tier-warm{background:rgba(245,158,11,.15);color:#fbbf24}
.tier-cold{background:rgba(99,102,241,.12);color:#818cf8}

/* ── 테마 그리드 ── */
.themes-label{font:500 12px var(--mono);color:var(--dim);margin-bottom:14px;text-align:center;letter-spacing:.08em}
.themes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;width:100%;max-width:900px}
.theme-chip{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .18s;text-decoration:none;display:flex;align-items:center;gap:10px}
.theme-chip:hover{border-color:var(--accent);background:rgba(118,185,0,.07);transform:translateY(-1px)}
.theme-chip .ti{font-size:20px}
.theme-chip .tn{font:600 13px var(--sans);color:var(--txt)}
.theme-chip .tier-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}
.type-chip{font:700 9px var(--mono);padding:2px 6px;border-radius:4px;flex-shrink:0;letter-spacing:.04em}
.type-person{background:rgba(167,139,250,.15);color:#a78bfa}
.type-company{background:rgba(56,189,248,.15);color:#38bdf8}
.hot .tier-dot{background:#f87171}
.warm .tier-dot{background:#fbbf24}
.cold .tier-dot{background:#818cf8}

footer{margin-top:48px;font:500 11px var(--mono);color:var(--dim);text-align:center}
footer a{color:var(--dim);text-decoration:none}
footer a:hover{color:var(--accent)}

@media(max-width:600px){
  .themes-grid{grid-template-columns:repeat(2,1fr)}
  .search-input{font-size:15px;padding:14px 50px 14px 16px}
}
</style>
</head>
<body>
<div class="home">
  <div class="logo"><span class="logo-dot"></span> MARKET RADAR · LIVE</div>
  <h1>인물·기업·테마<span>를 검색하세요</span></h1>
  <p class="sub">젠슨 황 같은 인물, 엔비디아 같은 기업, HBM 같은 산업 테마 — 키워드 타입에 맞는 실시간 뉴스·주가·AI 인사이트를 한눈에</p>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="검색 — 젠슨황, 엔비디아, HBM, 전기차..." autocomplete="off">
    <button class="search-btn" onclick="goSearch()">검색</button>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="themes-label">인기 테마 바로가기</div>
  <div class="themes-grid" id="themesGrid"></div>

  <footer>
    <span>30분마다 자동 업데이트 · AI 분석은 투자 권유가 아닙니다</span><br>
    <a href="https://jensen-realtime.vercel.app" target="_blank">젠슨황 트래커 →</a>
  </footer>
</div>

<script>
var KEYWORDS = [];

fetch('/data/keywords/index.json')
  .then(function(r){return r.json();})
  .then(function(d){
    KEYWORDS = d.keywords;
    renderGrid();
  });

function typeChip(k){
  if(k.type==='person') return '<span class="type-chip type-person">인물</span>';
  if(k.type==='company') return '<span class="type-chip type-company">기업</span>';
  return '';
}

function renderGrid(){
  var g = document.getElementById('themesGrid');
  g.innerHTML = KEYWORDS.map(function(k){
    return '<a class="theme-chip '+k.tier+'" href="/keyword/'+encodeURIComponent(k.slug)+'">'
      +'<span class="ti">'+k.icon+'</span>'
      +'<span class="tn">'+k.name.ko+'</span>'
      +typeChip(k)
      +'<span class="tier-dot"></span>'
      +'</a>';
  }).join('');
}

var inp = document.getElementById('searchInput');
var dd  = document.getElementById('dropdown');

inp.addEventListener('input', function(){
  var qRaw = this.value.trim();
  var q = qRaw.toLowerCase();
  if(!q){dd.classList.remove('show');return;}
  var matches = KEYWORDS.filter(function(k){
    return k.slug.toLowerCase().includes(q) || k.name.ko.includes(qRaw) || (k.name.en||'').toLowerCase().includes(q);
  });
  var items = matches.slice(0,7).map(function(k){
    return '<div class="dd-item" onclick="navigate(\''+k.slug+'\')">'
      +'<span class="dd-icon">'+k.icon+'</span>'
      +'<span class="dd-name">'+k.name.ko+'</span>'
      +typeChip(k)
      +'<span class="dd-tier tier-'+k.tier+'">'+k.tier.toUpperCase()+'</span>'
      +'</div>';
  });
  // 카탈로그에 정확 매칭 없으면 "즉석 리서치" 옵션 노출
  var hasExact = matches.some(function(k){
    return k.slug.toLowerCase()===q || k.name.ko===qRaw || (k.name.en||'').toLowerCase()===q;
  });
  if(!hasExact && qRaw.length>=2){
    items.push('<div class="dd-item" onclick="window.location.href=\'/research?q=\'+encodeURIComponent(\''+qRaw.replace(/\'/g,"\\\\'")+'\')" style="border-top:1px dashed var(--line2)">'
      +'<span class="dd-icon">🔬</span>'
      +'<span class="dd-name">"'+qRaw+'" 즉석 리서치 (15~40초)</span>'
      +'<span class="dd-tier" style="background:rgba(118,185,0,.15);color:var(--accent)">NEW</span>'
      +'</div>');
  }
  if(!items.length){dd.classList.remove('show');return;}
  dd.innerHTML = items.join('');
  dd.classList.add('show');
});

inp.addEventListener('keydown', function(e){
  if(e.key==='Enter') goSearch();
  if(e.key==='Escape') dd.classList.remove('show');
});

document.addEventListener('click', function(e){
  if(!e.target.closest('.search-wrap')) dd.classList.remove('show');
});

function navigate(slug){ window.location.href = '/keyword/'+encodeURIComponent(slug); }

function goSearch(){
  var q = inp.value.trim();
  if(!q) return;
  var match = KEYWORDS.find(function(k){
    return k.slug.toLowerCase()===q.toLowerCase() || k.name.ko===q || (k.name.en||'').toLowerCase()===q.toLowerCase();
  });
  if(match){ navigate(match.slug); return; }
  // 부분 매칭
  var partial = KEYWORDS.find(function(k){
    return k.slug.toLowerCase().includes(q.toLowerCase()) || k.name.ko.includes(q) || (k.name.en||'').toLowerCase().includes(q.toLowerCase());
  });
  if(partial){ navigate(partial.slug); return; }
  // 카탈로그에 없는 새 키워드 → 즉석 리서치 페이지로
  window.location.href = '/research?q=' + encodeURIComponent(q);
}
</script>
</body>
</html>
